<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin | OfertasVIP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] } } }
    };
  </script>

  <style>
    /* Page is hidden until auth is confirmed — prevents flash of admin content */
    body { opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
    body.auth-ready { opacity: 1; pointer-events: auto; }
    .toast { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
  </style>
</head>

<body class="bg-slate-100 font-sans text-slate-800">

  <!-- ===================== NAVBAR ===================== -->
  <nav class="bg-[#0F1729] text-white shadow-xl sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="index.html" class="text-xl font-black tracking-tight flex items-center">
          <i class="fas fa-bolt text-orange-500 mr-2"></i>
          Ofertas<span class="text-orange-500">VIP</span>
        </a>
        <span class="hidden sm:inline text-white/30 text-sm">/ Admin</span>
      </div>

      <div class="flex items-center gap-4">
        <!-- Stats (updated by JS) -->
        <div id="nav-stats" class="hidden sm:flex items-center gap-4 text-xs text-white/50">
          <span><i class="fas fa-box mr-1"></i><span id="stat-total">–</span> produtos</span>
          <span class="text-green-400"><i class="fas fa-circle text-[8px] mr-1"></i><span id="stat-active">–</span> ativos</span>
          <span class="text-red-400"><i class="fas fa-circle text-[8px] mr-1"></i><span id="stat-expired">–</span> expirados</span>
        </div>

        <a href="index.html" class="text-white/50 hover:text-white transition text-sm hidden sm:block">
          <i class="fas fa-eye mr-1"></i> Ver site
        </a>

        <button id="logout-btn" class="bg-red-500 hover:bg-red-600 text-white text-xs font-semibold px-4 py-2 rounded-lg transition flex items-center gap-1.5">
          <i class="fas fa-right-from-bracket"></i> Sair
        </button>
      </div>
    </div>
  </nav>

  <!-- ===================== MAIN CONTENT ===================== -->
  <div class="container mx-auto px-4 py-8 max-w-5xl">
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-8 items-start">

      <!-- ===== FORM COLUMN ===== -->
      <div class="lg:col-span-2">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">

          <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
            <div>
              <h2 id="form-title" class="text-lg font-bold text-slate-800">Novo Produto</h2>
              <p class="text-xs text-slate-400">Preencha os campos abaixo</p>
            </div>
            <i class="fas fa-plus-circle text-orange-500 text-2xl"></i>
          </div>

          <!-- Hidden edit ID -->
          <input type="hidden" id="editing-id">

          <form id="product-form" class="space-y-4" novalidate>

            <!-- Title -->
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1">Nome do Produto *</label>
              <input type="text" id="title" required maxlength="120"
                placeholder="Ex: Fone Bluetooth JBL Tune 520BT"
                class="input-field w-full border border-slate-300 rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 transition">
            </div>

            <!-- Description -->
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1">Descrição Curta</label>
              <input type="text" id="description" maxlength="100"
                placeholder="Ex: Frete grátis · 12x sem juros"
                class="input-field w-full border border-slate-300 rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 transition">
            </div>

            <!-- Prices -->
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Preço De (R$)</label>
                <input type="number" id="original-price" step="0.01" min="0"
                  placeholder="0,00"
                  class="input-field w-full border border-slate-300 rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 transition">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Preço Por (R$) *</label>
                <input type="number" id="price" step="0.01" min="0" required
                  placeholder="0,00"
                  class="input-field w-full border border-slate-300 rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 transition">
              </div>
            </div>

            <!-- Discount preview -->
            <div id="discount-preview" class="hidden bg-orange-50 border border-orange-200 rounded-lg px-3 py-2 text-sm text-orange-700 font-semibold flex items-center gap-2">
              <i class="fas fa-tag"></i>
              <span id="discount-text"></span>
            </div>

            <!-- Platform + Category -->
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Plataforma</label>
                <select id="platform" class="input-field w-full border border-slate-300 rounded-lg py-2.5 px-3 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-orange-400 transition">
                  <option value="Shopee">Shopee</option>
                  <option value="Mercado Livre">Mercado Livre</option>
                  <option value="Amazon">Amazon</option>
                  <option value="Magalu">Magalu</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Categoria</label>
                <select id="category" class="input-field w-full border border-slate-300 rounded-lg py-2.5 px-3 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-orange-400 transition">
                  <option value="Tecnologia">💻 Tecnologia</option>
                  <option value="Casa">🏠 Casa</option>
                  <option value="Moda">👗 Moda</option>
                  <option value="Ferramentas">🔧 Ferramentas</option>
                  <option value="Outros">✨ Outros</option>
                </select>
              </div>
            </div>

            <!-- Image URL + Preview -->
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1">URL da Imagem *</label>
              <input type="url" id="image-url" required
                placeholder="https://..."
                class="input-field w-full border border-slate-300 rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 transition">
              <!-- Image preview -->
              <div id="img-preview-box" class="hidden mt-2 h-24 bg-slate-50 rounded-lg border border-slate-200 flex items-center justify-center overflow-hidden">
                <img id="img-preview" class="max-h-full max-w-full object-contain" alt="Pré-visualização">
              </div>
            </div>

            <!-- Affiliate Link -->
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1">Link de Afiliado *</label>
              <input type="url" id="affiliate-link" required
                placeholder="https://..."
                class="input-field w-full border border-slate-300 rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 transition">
            </div>

            <!-- Expiration Date -->
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1">Validade da Oferta (opcional)</label>
              <input type="date" id="expires-at"
                class="input-field w-full border border-slate-300 rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 transition">
              <p class="text-[11px] text-slate-400 mt-1">Deixe em branco para oferta sem prazo.</p>
            </div>

            <!-- Is Hot -->
            <label class="flex items-center gap-3 bg-orange-50 border border-orange-200 rounded-lg px-3 py-2.5 cursor-pointer hover:bg-orange-100 transition">
              <input type="checkbox" id="is-hot" class="w-4 h-4 accent-orange-500">
              <span class="text-sm font-semibold text-orange-700">🔥 Marcar como oferta quente</span>
            </label>

            <!-- Submit -->
            <button type="submit" id="submit-btn"
              class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 shadow-md shadow-orange-200 disabled:opacity-60 disabled:cursor-not-allowed">
              <i class="fas fa-upload"></i>
              <span id="submit-text">Publicar Oferta</span>
            </button>

            <!-- Cancel edit -->
            <button type="button" id="cancel-edit-btn"
              class="hidden w-full border-2 border-slate-300 text-slate-500 font-semibold py-2.5 rounded-xl hover:bg-slate-100 transition text-sm">
              <i class="fas fa-times mr-1"></i> Cancelar Edição
            </button>

          </form>
        </div>
      </div>

      <!-- ===== PRODUCTS LIST COLUMN ===== -->
      <div class="lg:col-span-3">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <div class="flex items-center justify-between mb-5 pb-4 border-b border-slate-100">
            <div>
              <h3 class="text-lg font-bold text-slate-800">Produtos Cadastrados</h3>
              <p class="text-xs text-slate-400">Últimos 50 · Tempo real</p>
            </div>
            <i class="fas fa-layer-group text-slate-300 text-2xl"></i>
          </div>

          <!-- Search in admin list -->
          <div class="relative mb-4">
            <input type="search" id="admin-search"
              placeholder="Filtrar por nome..."
              class="w-full border border-slate-200 rounded-lg py-2 px-4 pl-9 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 transition">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
          </div>

          <!-- List -->
          <ul id="admin-list" class="space-y-2 max-h-[600px] overflow-y-auto pr-1">
            <!-- Injected by admin.js -->
          </ul>

          <!-- Empty state -->
          <div id="list-empty" class="hidden text-center py-12 text-slate-400">
            <i class="fas fa-inbox text-4xl mb-3 block opacity-30"></i>
            <p class="text-sm">Nenhum produto cadastrado ainda.</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ===================== MODAL DE CONFIRMAÇÃO ===================== -->
  <div id="confirm-modal" class="hidden fixed inset-0 bg-black/50 z-[9998] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full animate-bounce-in">
      <div class="text-center mb-6">
        <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-3">
          <i class="fas fa-trash text-red-500 text-xl"></i>
        </div>
        <h3 class="font-bold text-slate-800 text-lg">Apagar produto?</h3>
        <p id="modal-product-name" class="text-slate-400 text-sm mt-1 line-clamp-2"></p>
      </div>
      <div class="flex gap-3">
        <button id="modal-cancel" class="flex-1 py-2.5 rounded-xl border-2 border-slate-200 text-slate-600 font-semibold hover:bg-slate-50 transition text-sm">
          Cancelar
        </button>
        <button id="modal-confirm" class="flex-1 py-2.5 rounded-xl bg-red-500 text-white font-bold hover:bg-red-600 transition text-sm">
          Apagar
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="admin.js"></script>

</body>
</html>
